networks:
  shared-proxy:
    external: true

services:
  backend:
    build: ./backend
    container_name: reservation-backend
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - shared-proxy
