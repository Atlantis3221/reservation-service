server {
    listen 80;
    server_name slotik.tech www.slotik.tech admin.slotik.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name slotik.tech www.slotik.tech;

    ssl_certificate /etc/letsencrypt/live/slotik.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slotik.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # API → backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check → backend
    location /health {
        proxy_pass http://backend:3000;
    }

    # Landing page — exact root
    location = / {
        root /usr/share/nginx/landing;
        try_files /index.html =404;
    }

    # Landing static assets (styles.css, media, etc.)
    location /styles.css {
        root /usr/share/nginx/landing;
    }

    location /media/ {
        root /usr/share/nginx/landing;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # React SPA — all other paths (/:slug)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# ---- Admin panel (admin.slotik.tech) ----

server {
    listen 443 ssl;
    server_name admin.slotik.tech;

    ssl_certificate /etc/letsencrypt/live/slotik.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slotik.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Admin API → backend
    location /admin/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin SPA
    location / {
        root /usr/share/nginx/admin;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
