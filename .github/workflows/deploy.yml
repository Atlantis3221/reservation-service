name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test --workspace=backend

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Build admin panel
        run: npm run build --workspace=admin
        env:
          VITE_METRIKA_COUNTER_ID: ${{ secrets.ADMIN_METRIKA_COUNTER_ID }}

      - name: Build landing
        run: npm run build:landing
        env:
          METRIKA_COUNTER_ID: ${{ secrets.LANDING_METRIKA_COUNTER_ID }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync project to server
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='data/' \
            --exclude='certbot/' \
            --exclude='frontend-dist/' \
            --exclude='admin-dist/' \
            --exclude='.git' \
            --exclude='backend/data/' \
            ./ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Sync frontend build
        run: |
          rsync -avz --delete \
            frontend/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/frontend-dist/

      - name: Sync admin build
        run: |
          rsync -avz --delete \
            admin/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/admin-dist/

      - name: Generate backend .env
        env:
          ENV_CONTENT: |
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            PORT=3000
            NODE_ENV=production
            FRONTEND_URL=https://slotik.tech
            ADMIN_URL=https://admin.slotik.tech
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MONITOR_BOT_TOKEN=${{ secrets.MONITOR_BOT_TOKEN }}
            VK_BOT_TOKEN=${{ secrets.VK_BOT_TOKEN }}
            VK_GROUP_ID=${{ secrets.VK_GROUP_ID }}
        run: |
          printf '%s' "$ENV_CONTENT" | ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cat > ${{ secrets.DEPLOY_PATH }}/backend/.env"

      - name: Backup database before restart
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash -s << 'BACKUP_SCRIPT'
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DB_FILE="$DEPLOY_PATH/data/reservations.db"
            BACKUP_DIR="$DEPLOY_PATH/data/backups"

            if [ -f "$DB_FILE" ]; then
              mkdir -p "$BACKUP_DIR"
              TIMESTAMP=$(date +%Y%m%d%H%M%S)
              cp "$DB_FILE" "$BACKUP_DIR/reservations-deploy-$TIMESTAMP.db"
              echo "Backup created: reservations-deploy-$TIMESTAMP.db"

              # Keep only last 10 deploy backups
              ls -1t "$BACKUP_DIR"/reservations-deploy-*.db 2>/dev/null | tail -n +11 | xargs -r rm -f
              echo "Backup rotation done"
            else
              echo "No database file found, skipping backup"
            fi
          BACKUP_SCRIPT

      - name: Restart containers
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && docker-compose up -d --build"

      - name: Health check
        run: |
          echo "Waiting for server to start..."
          sleep 10
          curl -sf https://slotik.tech/health || echo "Health check failed (may need SSL init)"
