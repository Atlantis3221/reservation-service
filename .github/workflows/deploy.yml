name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test --workspace=backend

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Build admin panel
        run: npm run build --workspace=admin

      - name: Build landing
        run: ADMIN_URL=https://admin.slotik.tech npm run build:landing

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync project to server
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='data/' \
            --exclude='certbot/' \
            --exclude='frontend-dist/' \
            --exclude='admin-dist/' \
            --exclude='.git' \
            --exclude='backend/data/' \
            ./ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Sync frontend build
        run: |
          rsync -avz --delete \
            frontend/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/frontend-dist/

      - name: Sync admin build
        run: |
          rsync -avz --delete \
            admin/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/admin-dist/

      - name: Restart containers
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && docker-compose up -d --build"

      - name: Health check
        run: |
          echo "Waiting for server to start..."
          sleep 10
          curl -sf https://slotik.tech/health || echo "Health check failed (may need SSL init)"
